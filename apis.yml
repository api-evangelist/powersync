---
aid: powersync
name: PowerSync
description: >-
  PowerSync is a sync engine that automatically synchronizes backend databases
  (Postgres, MongoDB, MySQL, SQL Server) with client-side SQLite, enabling
  offline-first and local-first applications. It consists of two components: the
  PowerSync Service (available as a managed cloud service or self-hosted via
  Docker) and a set of open-source client SDKs. Client SDKs are available for
  JavaScript/Web, React Native, Flutter/Dart, Kotlin, Swift, Node.js, .NET, and
  Rust. Authentication is handled via JWT tokens, with support for major
  providers including Auth0, Firebase, Supabase, Amazon Cognito, and Azure AD.
  PowerSync streams database changes in real-time so clients can query and
  mutate local SQLite without waiting on the network.
type: Index
