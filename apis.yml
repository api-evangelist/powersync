apis:
  - aid: powersync:sync-service
    name: PowerSync Sync Service API
    description: >-
      The PowerSync Service exposes a streaming sync protocol over HTTP/WebSocket
      that client SDKs connect to using JWT authentication. Clients submit their
      current bucket state and the service streams real-time checkpoint and
      operation data back, enabling incremental SQLite sync for offline-first
      apps.
    humanURL: https://docs.powersync.com/architecture/powersync-service
    tags:
