principles:
  - name: Visibility
    description: >-
      Track PowerSync Cloud consumption monthly across data synced (GB), data
      hosted (GB), and peak concurrent connections per instance to surface
      cost drivers.
  - name: Optimization
    description: >-
      Right-size plan tier based on monthly sync volume and peak connection
      patterns; monitor for unused instances and deactivate idle projects on
      Free tier to avoid forced deactivation.
  - name: Accountability
    description: >-
      Tag service instances by application or team to attribute sync costs;
      use plan overage alerts (webhook alerts available on Pro+) to prevent
      unexpected charges.
